<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OliMai Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #020617;
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    .card {
      background: linear-gradient(145deg, #0f172a, #020617);
      border-radius: 25px;
      padding: 40px 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 40px rgba(236,72,153,0.3);
    }

    h1 {
      color: #f0abfc;
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .whatsapp {
      background: #25D366;
      color: white;
    }

    .instagram {
      background: #E1306C;
      color: white;
    }

    .tiktok {
      background: #000;
      border: 1px solid white;
    }

    .email {
      background: #6366f1;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #64748b;
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="card">
      <h1>OliMai Store</h1>
      <p>Tecnología y recuerdos en un solo clic</p>

      <p style="margin-top:20px;">
        Estamos construyendo algo increíble para ti 🚀
      </p>

      <div class="buttons">
        <a class="btn whatsapp" href="https://wa.me/56929933458" target="_blank">WhatsApp</a>
        <a class="btn instagram" href="https://www.instagram.com/olimai_store/" target="_blank">Instagram</a>
        <a class="btn tiktok" href="https://www.tiktok.com/@olimai_store" target="_blank">TikTok</a>
        <a class="btn email" href="mailto:ventas@olimaistore.cl">Correo</a>
      </div>
    </div>

    <footer>
      © 2025 OliMai Store - Todos los derechos reservados
    </footer>
  </div>

</body>
</html>
